name: Test

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide whether to lint. Always on pull requests. On a push to master, skip if
  # the pushed commit came from a merged PR (already linted on the PR), but run for
  # a direct push. Uses the commit/PR association, so it is independent of the merge
  # strategy (merge commit, squash, or rebase).
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - name: Decide
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$GITHUB_EVENT_NAME" != 'push' ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          count="$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/pulls" --jq 'length')"
          if [ "$count" -gt 0 ]; then
            echo "$GITHUB_SHA came from a PR; skipping (already linted on the PR)."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  # Static checks only. Building the images and running the structure tests happens
  # in build_and_push.yml (build once, test in place), so it is not duplicated here.
  lint:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install hadolint + actionlint
        env:
          # renovate: datasource=github-releases depName=hadolint/hadolint
          HADOLINT_VERSION: v2.14.0
          # renovate: datasource=github-releases depName=rhysd/actionlint
          ACTIONLINT_VERSION: v1.7.12
        run: |
          # Pinned + checksum-verified (Renovate bumps the versions above). shellcheck
          # ships with the runner; only hadolint + actionlint are installed here.
          hadolint_base="https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}"
          curl -fsSL --retry 3 --retry-delay 2 -o /tmp/hadolint "${hadolint_base}/hadolint-linux-x86_64"
          curl -fsSL --retry 3 --retry-delay 2 -o /tmp/hadolint.sha256 "${hadolint_base}/hadolint-linux-x86_64.sha256"
          echo "$(awk '{print $1}' /tmp/hadolint.sha256)  /tmp/hadolint" | sha256sum -c -
          sudo install -m 0755 /tmp/hadolint /usr/local/bin/hadolint

          actionlint_base="https://github.com/rhysd/actionlint/releases/download/${ACTIONLINT_VERSION}"
          actionlint_tar="actionlint_${ACTIONLINT_VERSION#v}_linux_amd64.tar.gz"
          curl -fsSL --retry 3 --retry-delay 2 -o /tmp/actionlint.tar.gz "${actionlint_base}/${actionlint_tar}"
          curl -fsSL --retry 3 --retry-delay 2 -o /tmp/actionlint.checksums "${actionlint_base}/actionlint_${ACTIONLINT_VERSION#v}_checksums.txt"
          echo "$(grep -F "${actionlint_tar}" /tmp/actionlint.checksums | awk '{print $1}')  /tmp/actionlint.tar.gz" | sha256sum -c -
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          sudo install -m 0755 /tmp/actionlint /usr/local/bin/actionlint

      - name: Lint
        run: ./scripts/test.sh lint
