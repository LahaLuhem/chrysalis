name: Test

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide whether to lint. Always on pull requests. On a push to master, skip if
  # the pushed commit came from a merged PR (already linted on the PR), but run for
  # a direct push. Uses the commit/PR association, so it is independent of the merge
  # strategy (merge commit, squash, or rebase).
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - name: Decide
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$GITHUB_EVENT_NAME" != 'push' ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          count="$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/pulls" --jq 'length')"
          if [ "$count" -gt 0 ]; then
            echo "$GITHUB_SHA came from a PR; skipping (already linted on the PR)."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  # Static checks only. Building the images and running the structure tests happens
  # in build_and_push.yml (build once, test in place), so it is not duplicated here.
  # The linters run from the pinned linterpol image (scripts/test.sh pulls it on demand);
  # there's no install step, and Docker is preinstalled on the runner.
  lint:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lint
        run: ./scripts/test.sh lint
