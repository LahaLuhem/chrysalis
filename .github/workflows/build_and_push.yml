name: Build Android + Flutter Images

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

# Publish only on master pushes or a manual run; pull requests build-validate
# (both arches) without pushing. Verify a feature branch with:
#   gh workflow run build_and_push.yml --ref <branch>

# Serialize publishes per ref so concurrent runs don't race on the shared
# tags (android-sdk:latest, flutter:stable). Don't cancel an in-flight publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      flutter_version: ${{ steps.vars.outputs.flutter_version }}
      docker_tag: ${{ steps.vars.outputs.docker_tag }}
      push: ${{ steps.vars.outputs.push }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Load version variables
        id: vars
        run: |
          source versions.env
          echo "flutter_version=$FLUTTER_VERSION" >> "$GITHUB_OUTPUT"
          echo "docker_tag=$DOCKER_TAG" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref }}" = "refs/heads/master" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

  # android-sdk is the base image; it must publish before flutter builds (flutter
  # FROMs android-sdk:latest). Built on every run, pushed only on publish runs.
  android-sdk:
    needs: prepare
    permissions:
      contents: read
      packages: write
    secrets: inherit
    uses: ./.github/workflows/build-image.yml
    with:
      name: android-sdk
      context: images/android-sdk
      tags: latest
      title: Android SDK
      description: Android SDK (cmdline-tools, platform-tools, build-tools, a platform) on Ubuntu
      push: ${{ needs.prepare.outputs.push == 'true' }}

  # flutter is built FROM the android-sdk manifest list, so it only runs on
  # publish runs (it needs the pushed base).
  flutter:
    needs: [prepare, android-sdk]
    if: needs.prepare.outputs.push == 'true'
    permissions:
      contents: read
      packages: write
    secrets: inherit
    uses: ./.github/workflows/build-image.yml
    with:
      name: flutter
      context: images/flutter
      tags: |
        ${{ needs.prepare.outputs.flutter_version }}
        ${{ needs.prepare.outputs.docker_tag }}
      title: Flutter
      description: Flutter on the chrysalis android-sdk base image
      build-args: |
        flutter_version=${{ needs.prepare.outputs.flutter_version }}
      push: ${{ needs.prepare.outputs.push == 'true' }}
