name: Build and publish one image (reusable)

# Builds one image for linux/amd64 + linux/arm64, structure-tests each arch on its
# native runner, then (on publish runs) pushes by digest and merges into a single
# manifest list. Called once per image by build_and_push.yml. On non-publish runs
# (push: false) it builds + structure-tests both arches for validation, no push.
on:
  workflow_call:
    inputs:
      name:
        description: Image name under the registry (e.g. android-sdk, flutter).
        required: true
        type: string
      context:
        description: Build context directory (holds the Dockerfile).
        required: true
        type: string
      tags:
        description: Newline-separated tags to publish onto the manifest list.
        required: true
        type: string
      title:
        description: OCI image title (org.opencontainers.image.title), e.g. "Flutter".
        required: true
        type: string
      description:
        description: OCI image description (org.opencontainers.image.description).
        required: true
        type: string
      build-args:
        description: Newline-separated build args passed to the build.
        required: false
        type: string
        default: ''
      push:
        description: Publish (build+push by digest, then merge) or just build-validate.
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io/lahaluhem

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to GHCR
        if: inputs.push
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the image once (native, loaded into Docker) so we can test it. The
      # push-by-digest build below reuses these layers from cache.
      - name: Build for test (load)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ inputs.context }}
          platforms: ${{ matrix.platform }}
          provenance: false
          build-args: ${{ inputs.build-args }}
          load: true
          tags: ${{ inputs.name }}:test
          cache-from: type=gha,scope=${{ inputs.name }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=${{ inputs.name }}-${{ env.PLATFORM_PAIR }},mode=max

      - name: Structure test
        env:
          IMG: ${{ inputs.name }}
        run: |
          # container-structure-test from the Linterpol image, pinned in .github/lint-tools.env
          # (single source, read the same way as scripts/test.sh). The image-under-test was loaded
          # into the runner's daemon by "Build for test (load)"; mount the runner's Docker socket so
          # the container reaches it, run as root for socket access, and use the default daemon driver
          # (specs use commandTests; tar can't run those).
          LINTERPOL_IMAGE="$(grep -E '^LINTERPOL_IMAGE=' .github/lint-tools.env | cut -d= -f2-)"
          docker run --rm --user 0:0 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work:ro" -w /work \
            "$LINTERPOL_IMAGE" \
            container-structure-test test --image "$IMG:test" --config "images/$IMG/structure-test.yaml"

      # Build the image to an OCI image layout (single-arch, amd64) and assert it uses OCI media
      # types throughout. Catches an oci-mediatypes / metadata regression at PR time, before the
      # publish-time assert_oci_registry.sh. Only on non-publish runs and the amd64 leg: a --load
      # image can't carry OCI media types, so this is a separate type=oci export; on publish runs
      # the registry assert covers it; and flutter never builds on PRs, so in practice this guards
      # android-sdk. Reuses the cached layers from "Build for test (load)".
      - name: Build OCI layout (amd64, PR-time validation)
        if: matrix.platform == 'linux/amd64' && !inputs.push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ inputs.context }}
          platforms: linux/amd64
          provenance: false
          build-args: ${{ inputs.build-args }}
          outputs: type=oci,oci-mediatypes=true,tar=false,dest=${{ runner.temp }}/oci-${{ inputs.name }}
          cache-from: type=gha,scope=${{ inputs.name }}-${{ env.PLATFORM_PAIR }}

      - name: Assert OCI layout media types
        if: matrix.platform == 'linux/amd64' && !inputs.push
        run: ./scripts/assert_oci_layout.sh "${{ runner.temp }}/oci-${{ inputs.name }}"

      # Generate OCI labels (image config) + manifest-level annotations from the build context.
      # title/description are per-image inputs; source/revision/created/version/licenses fill in
      # from the repo and the build commit. The Dockerfiles carry no LABELs; this is the single
      # source. tags are fed only so org.opencontainers.image.version reflects the primary tag;
      # the merge step does the actual tagging from inputs.tags.
      - name: Compose image tag specs for metadata
        id: tagspecs
        if: inputs.push
        env:
          TAGS: ${{ inputs.tags }}
        run: |
          {
            echo 'specs<<EOF'
            while IFS= read -r t; do
              [ -n "$t" ] && echo "type=raw,value=$t"
            done <<< "$TAGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Docker metadata (labels + manifest annotations)
        id: meta
        if: inputs.push
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ inputs.name }}
          tags: ${{ steps.tagspecs.outputs.specs }}
          labels: |
            org.opencontainers.image.title=${{ inputs.title }}
            org.opencontainers.image.description=${{ inputs.description }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest

      # Push by digest, reusing the cached layers from the test build above. oci-mediatypes=true
      # makes the pushed manifest, config, and layers use OCI media types; labels + manifest
      # annotations come from metadata-action (the Dockerfiles carry none).
      - name: Build and push by digest
        id: build
        if: inputs.push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ inputs.context }}
          platforms: ${{ matrix.platform }}
          provenance: false
          build-args: ${{ inputs.build-args }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ inputs.name }},push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true
          cache-from: type=gha,scope=${{ inputs.name }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        if: inputs.push
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: inputs.push
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digests-${{ inputs.name }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    if: inputs.push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ inputs.name }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Index-level OCI annotations for the manifest list (the consumer-visible set). Same metadata
      # source as the per-arch build, but annotations level = index here. tags feed only the version
      # field; actual tagging is done below from inputs.tags.
      - name: Compose image tag specs for metadata
        id: tagspecs
        env:
          TAGS: ${{ inputs.tags }}
        run: |
          {
            echo 'specs<<EOF'
            while IFS= read -r t; do
              [ -n "$t" ] && echo "type=raw,value=$t"
            done <<< "$TAGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Docker metadata (index annotations)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ inputs.name }}
          tags: ${{ steps.tagspecs.outputs.specs }}
          labels: |
            org.opencontainers.image.title=${{ inputs.title }}
            org.opencontainers.image.description=${{ inputs.description }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index

      - name: Create manifest list and push
        shell: bash
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ inputs.name }}
          TAGS: ${{ inputs.tags }}
          ANNOTATIONS: ${{ steps.meta.outputs.annotations }}
        run: |
          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && tag_args+=(-t "$IMAGE:$tag")
          done <<< "$TAGS"
          # Index-level OCI annotations from metadata-action, one "index:KEY=VALUE" per line;
          # imagetools create applies them to the manifest list (index) it builds.
          annotation_args=()
          while IFS= read -r ann; do
            [ -n "$ann" ] && annotation_args+=(--annotation "$ann")
          done <<< "$ANNOTATIONS"
          sources=()
          for digest in *; do sources+=("$IMAGE@sha256:$digest"); done
          docker buildx imagetools create "${tag_args[@]}" "${annotation_args[@]}" "${sources[@]}"

      - name: Inspect
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ inputs.name }}
          TAGS: ${{ inputs.tags }}
        run: |
          first_tag="$(grep -m1 . <<< "$TAGS")"
          docker buildx imagetools inspect "$IMAGE:$first_tag"

      - name: Install crane
        uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7

      # A publish is only "done" when the pushed image carries both arches (hard rule 8) and uses
      # OCI media types end to end. assert_oci_registry.sh checks the index, both arches, and every
      # manifest/config/layer; crane then validates the image is well-formed and pullable.
      - name: Verify the published image (OCI media types + crane validate)
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ inputs.name }}
          TAGS: ${{ inputs.tags }}
        run: |
          first_tag="$(grep -m1 . <<< "$TAGS")"
          ./scripts/assert_oci_registry.sh "$IMAGE:$first_tag"
          crane validate --remote "$IMAGE:$first_tag"
