name: Build and publish one image (reusable)

# Builds one image for linux/amd64 + linux/arm64, structure-tests each arch on its
# native runner, then (on publish runs) pushes by digest and merges into a single
# manifest list. Called once per image by build_and_push.yml. On non-publish runs
# (push: false) it builds + structure-tests both arches for validation, no push.
on:
  workflow_call:
    inputs:
      name:
        description: Image name under the registry (e.g. android-sdk, flutter).
        required: true
        type: string
      context:
        description: Build context directory (holds the Dockerfile).
        required: true
        type: string
      tags:
        description: Newline-separated tags to publish onto the manifest list.
        required: true
        type: string
      build-args:
        description: Newline-separated build args passed to the build.
        required: false
        type: string
        default: ''
      push:
        description: Publish (build+push by digest, then merge) or just build-validate.
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io/lahaluhem

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to GHCR
        if: inputs.push
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the image once (native, loaded into Docker) so we can test it. The
      # push-by-digest build below reuses these layers from cache.
      - name: Build for test (load)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ${{ inputs.context }}
          platforms: ${{ matrix.platform }}
          provenance: false
          build-args: ${{ inputs.build-args }}
          load: true
          tags: ${{ inputs.name }}:test
          cache-from: type=gha,scope=${{ inputs.name }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=${{ inputs.name }}-${{ env.PLATFORM_PAIR }},mode=max

      - name: Structure test
        env:
          IMG: ${{ inputs.name }}
          # renovate: datasource=docker depName=ghcr.io/lahaluhem/linterpol
          LINTERPOL_IMAGE: ghcr.io/lahaluhem/linterpol:latest@sha256:7025a7405bd313fb33c030b941d738ac6c94b87250a30d94b4248441867aa2e2
        run: |
          # container-structure-test from the pinned Linterpol image (same image as scripts/test.sh).
          # The image-under-test was loaded into the runner's daemon by "Build for test (load)";
          # mount the runner's Docker socket so the container reaches it, run as root for socket
          # access, and use the default daemon driver (specs use commandTests; tar can't run those).
          docker run --rm --user 0:0 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work:ro" -w /work \
            "$LINTERPOL_IMAGE" \
            container-structure-test test --image "$IMG:test" --config "images/$IMG/structure-test.yaml"

      # Push by digest, reusing the cached layers from the test build above.
      - name: Build and push by digest
        id: build
        if: inputs.push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ${{ inputs.context }}
          platforms: ${{ matrix.platform }}
          provenance: false
          build-args: ${{ inputs.build-args }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ inputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ inputs.name }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        if: inputs.push
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: inputs.push
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digests-${{ inputs.name }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    if: inputs.push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ inputs.name }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        shell: bash
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ inputs.name }}
          TAGS: ${{ inputs.tags }}
        run: |
          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && tag_args+=(-t "$IMAGE:$tag")
          done <<< "$TAGS"
          sources=()
          for digest in *; do sources+=("$IMAGE@sha256:$digest"); done
          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"

      - name: Inspect
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ inputs.name }}
          TAGS: ${{ inputs.tags }}
        run: |
          first_tag="$(grep -m1 . <<< "$TAGS")"
          docker buildx imagetools inspect "$IMAGE:$first_tag"
