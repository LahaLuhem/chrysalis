name: Build and publish one image (reusable)

# Builds one image for linux/amd64 + linux/arm64 by digest, then merges the
# per-arch digests into a single manifest list. Called once per image by
# build_and_push.yml. On non-publish runs (push: false) it builds both arches
# for validation without pushing, and the merge is skipped.
on:
  workflow_call:
    inputs:
      name:
        description: Image name under the registry (e.g. android-sdk, flutter).
        required: true
        type: string
      context:
        description: Build context directory (holds the Dockerfile).
        required: true
        type: string
      tags:
        description: Newline-separated tags to publish onto the manifest list.
        required: true
        type: string
      build-args:
        description: Newline-separated build args passed to the build.
        required: false
        type: string
        default: ''
      push:
        description: Publish (build+push by digest, then merge) or just build-validate.
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io/lahaluhem

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (push by digest on publish runs)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          platforms: ${{ matrix.platform }}
          # Disable provenance/SBOM attestations: they add `unknown/unknown`
          # entries to the manifest list that muddy `docker manifest inspect`.
          provenance: false
          build-args: ${{ inputs.build-args }}
          outputs: ${{ inputs.push && format('type=image,name={0}/{1},push-by-digest=true,name-canonical=true,push=true', env.REGISTRY, inputs.name) || 'type=image,push=false' }}
          cache-from: type=gha,scope=${{ inputs.name }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=${{ inputs.name }}-${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        if: inputs.push
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: inputs.push
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ inputs.name }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    if: inputs.push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ inputs.name }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        shell: bash
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ inputs.name }}
          TAGS: ${{ inputs.tags }}
        run: |
          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && tag_args+=(-t "$IMAGE:$tag")
          done <<< "$TAGS"
          sources=()
          for digest in *; do sources+=("$IMAGE@sha256:$digest"); done
          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"

      - name: Inspect
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ inputs.name }}
          TAGS: ${{ inputs.tags }}
        run: |
          first_tag="$(grep -m1 . <<< "$TAGS")"
          docker buildx imagetools inspect "$IMAGE:$first_tag"
