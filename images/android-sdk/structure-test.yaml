schemaVersion: 2.0.0

# Structural assertions for the android-sdk image. Component versions
# (build-tools 36.0.0, platform android-36) mirror the Dockerfile alongside this
# spec; bump them here in lockstep if the Dockerfile changes.

metadataTest:
  envVars:
    - key: ANDROID_HOME
      value: /opt/android-sdk-linux
    - key: ANDROID_SDK_ROOT
      value: /opt/android-sdk-linux

fileExistenceTests:
  - name: cmdline-tools (sdkmanager)
    path: /opt/android-sdk-linux/cmdline-tools/latest/bin/sdkmanager
    shouldExist: true
  - name: platform-tools (adb)
    path: /opt/android-sdk-linux/platform-tools/adb
    shouldExist: true
  - name: build-tools 36.0.0 (aapt2)
    path: /opt/android-sdk-linux/build-tools/36.0.0/aapt2
    shouldExist: true
  - name: platform android-36 (android.jar)
    path: /opt/android-sdk-linux/platforms/android-36/android.jar
    shouldExist: true
  - name: x86-64 dynamic loader present (arm64 runs the SDK tools under emulation)
    # On amd64 this is the native loader. On arm64 it exists only because the
    # Dockerfile bakes libc6:amd64 (the arm64 emulation-libs layer); its absence
    # there means the x86-64 libs were dropped and Android builds would fail.
    path: /lib64/ld-linux-x86-64.so.2
    shouldExist: true

commandTests:
  - name: sdkmanager is runnable
    command: sdkmanager
    args: ['--version']
    exitCode: 0
  # Arch-agnostic: checks the runtime $JAVA_HOME resolves to a working JDK (javac), so it
  # holds on both amd64 and arm64 without hardcoding the arch-specific path.
  - name: JAVA_HOME points to a working JDK
    command: sh
    args: ['-c', 'test -n "$JAVA_HOME" && "$JAVA_HOME/bin/javac" -version']
    exitCode: 0
  # yq DX tool (downloaded static Go binary): proves it's on PATH and runs. exitCode-only and
  # version-agnostic (Renovate bumps it); a wrong-arch binary wouldn't execute, so an exit 0
  # here also confirms the amd64/arm64 download matched the image arch.
  - name: yq is runnable (YAML DX tool)
    command: yq
    args: ['--version']
    exitCode: 0
  # openssl backs the ch-fetch-firebase-config helper (shipped in the flutter image on top): it
  # signs the OAuth2 JWT and base64-decodes the config. Assert it's on PATH here, where it's
  # installed. Arch-agnostic exit-0 check.
  - name: openssl is runnable (backs the Firebase config fetcher)
    command: openssl
    args: ['version']
    exitCode: 0
