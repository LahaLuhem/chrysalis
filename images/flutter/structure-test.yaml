schemaVersion: 2.0.0

# Structural assertions for the flutter image. The exact Flutter version is NOT
# pinned here on purpose: it tracks versions.env (auto-bumped), so scripts/test.sh
# checks the exact version separately. Here we just prove the toolchain runs.

commandTests:
  - name: flutter --version reports Flutter and Dart
    command: flutter
    args: ['--version']
    exitCode: 0
    expectedOutput:
      - 'Flutter \d+\.\d+\.\d+'
      - 'Dart \d+\.\d+\.\d+'
  - name: dart is runnable
    command: dart
    args: ['--version']
    exitCode: 0
  # DX CLIs from the flutter Dockerfile's "Flutter DX tooling" layer: prove they're on PATH and
  # run. Version-agnostic on purpose (Renovate bumps them); --help is the stable exit-0 invocation.
  - name: cider runs (changelog + version-bump DX tool)
    command: cider
    args: ['--help']
    exitCode: 0
  - name: dependency_validator runs (dependency-hygiene DX tool)
    command: dependency_validator
    args: ['--help']
    exitCode: 0
  # Build-env setup helpers from the flutter Dockerfile's "Build-env setup helpers" layer: prove
  # they're on PATH and run. --help is the stable exit-0 invocation (it precedes any required-arg
  # or project-root checks, so it needs no pubspec.yaml or env) and prints to stdout, which
  # expectedOutput matches.
  - name: ch-build-setup-android runs (build-env prep helper)
    command: ch-build-setup-android
    args: ['--help']
    exitCode: 0
    expectedOutput:
      - 'dart-define'
      - 'CH_BUILD_DART_DEFINE_FILE'
  - name: ch-fetch-firebase-config runs (standalone Firebase config fetcher)
    command: ch-fetch-firebase-config
    args: ['--help']
    exitCode: 0
    expectedOutput:
      - '--android'
      - '--ios'
      - '--force'
      - 'CH_BUILD_FIREBASE_CLIENT_EMAIL'
  - name: ch-write-dart-defines runs (standalone dart-define writer)
    command: ch-write-dart-defines
    args: ['--help']
    exitCode: 0
    expectedOutput:
      - 'CH_BUILD_DEFINE'
      - '--out'

# The image ships with telemetry off and Flutter's version-freshness check skipped, and bakes the
# two published paths the build-env helper writes/reads (see the flutter Dockerfile): assert those
# env defaults are actually baked in.
metadataTest:
  envVars:
    - key: FLUTTER_SUPPRESS_ANALYTICS
      value: "true"
    - key: BOT
      value: "true"
    - key: CH_BUILD_DART_DEFINE_FILE
      value: "lib/env/dart_defines.env"
    - key: CH_BUILD_CACHE_KEYSTORE
      value: "android/app/ch-signing.p12"
    - key: GRADLE_USER_HOME
      value: "/root/.gradle"
    - key: CH_BUILD_CACHE_GRADLE_MODULES
      value: "/root/.gradle/caches/modules-2"
    - key: CH_BUILD_CACHE_GRADLE_DISTS
      value: "/root/.gradle/wrapper/dists"
